<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} - Carolin's Kasse</title>
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
    <nav>
        <span class="logo">Carolin's Kasse</span>
        <a href="/products" class="{% if active == 'products' %}active{% endif %}">Produkte</a>
        <a href="/users" class="{% if active == 'users' %}active{% endif %}">Benutzer</a>
        <a href="/recipes" class="{% if active == 'recipes' %}active{% endif %}">Rezepte</a>
        <a href="/printables" class="{% if active == 'printables' %}active{% endif %}">Drucken</a>
        <a href="/debug" class="{% if active == 'debug' %}active{% endif %}">Debug</a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <div class="modal" id="barcodeModal" aria-hidden="true">
        <span class="modal-close" data-modal-close role="button" tabindex="0" aria-label="Schließen">&times;</span>
        <img id="modalImage" src="" alt="Barcode">
    </div>

    <script>
        const barcodeModal = document.getElementById('barcodeModal');
        const modalImage = document.getElementById('modalImage');

        function showBarcode(src) {
            if (!src) return;
            modalImage.src = src;
            barcodeModal.classList.add('active');
            barcodeModal.setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
            barcodeModal.classList.remove('active');
            barcodeModal.setAttribute('aria-hidden', 'true');
            modalImage.removeAttribute('src');
        }

        document.addEventListener('click', (event) => {
            if (!(event.target instanceof Element)) return;

            const barcodeTrigger = event.target.closest('[data-barcode-src]');
            if (barcodeTrigger) {
                showBarcode(barcodeTrigger.dataset.barcodeSrc);
                return;
            }

            if (event.target === barcodeModal || event.target.closest('[data-modal-close]')) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'Enter' || e.key === ' ') && e.target instanceof Element) {
                const barcodeTrigger = e.target.closest('[data-barcode-src]');
                if (barcodeTrigger) {
                    e.preventDefault();
                    showBarcode(barcodeTrigger.dataset.barcodeSrc);
                    return;
                }
            }
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
