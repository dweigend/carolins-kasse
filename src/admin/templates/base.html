<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} - Carolin's Kasse</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.5;
        }

        nav {
            background: #1d1d1f;
            padding: 1rem 2rem;
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav .logo {
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
        }

        nav a {
            color: #86868b;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        nav a:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        nav a.active {
            color: #fff;
            background: #0071e3;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        table {
            width: 100%;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-collapse: collapse;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e5e5e5;
        }

        th {
            background: #fafafa;
            font-weight: 600;
            color: #86868b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: #fafafa;
        }

        .barcode-cell {
            width: 200px;
        }

        .barcode-img {
            max-width: 180px;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .barcode-img:hover {
            transform: scale(1.05);
        }

        .price {
            font-weight: 600;
            color: #1d1d1f;
        }

        .category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #e5e5e5;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-admin {
            background: #ffd700;
            color: #1d1d1f;
        }

        .badge-touch {
            background: #e5e5e5;
            color: #86868b;
        }

        .color-dot {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        .ingredients {
            font-size: 0.9rem;
            color: #86868b;
        }

        /* Modal for enlarged barcode */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
        }

        .modal-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav>
        <span class="logo">🛒 Carolin's Kasse</span>
        <a href="/products" class="{% if active == 'products' %}active{% endif %}">Produkte</a>
        <a href="/users" class="{% if active == 'users' %}active{% endif %}">Benutzer</a>
        <a href="/recipes" class="{% if active == 'recipes' %}active{% endif %}">Rezepte</a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Modal for enlarged barcode -->
    <div class="modal" id="barcodeModal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" alt="Barcode">
    </div>

    <script>
        function showBarcode(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('barcodeModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('barcodeModal').classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
